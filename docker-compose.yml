version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: meu_projeto_db_container
    environment:
      POSTGRES_DB: meu_projeto_db
      POSTGRES_USER: usuario_dev
      POSTGRES_PASSWORD: senha_dev
    ports:
      # Mapeia a porta 5435 do seu localhost (host) para a porta 5432 do container (padrão do Postgres)
      - "5435:5432"
    volumes:
      # Persiste os dados mesmo se o container for destruído
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: